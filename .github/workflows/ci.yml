name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run oxlint
        run: npx oxlint .

      - name: Run eslint
        run: npx eslint .

      - name: Type check
        run: npm run type-check

      - name: Build project
        run: npm run build-only
        env:
          VITE_BASE_PATH: /
